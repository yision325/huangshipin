<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2C2416">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>努力养猪咪 | 中古饰品精选</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #8B7355;
            --primary-light: #D4C4B0;
            --accent: #C9A96E;
            --bg-cream: #FAF8F5;
            --bg-warm: #F5F0E8;
            --text-dark: #2C2416;
            --text-medium: #5C4D3C;
            --text-light: #8B7D6B;
            --shadow: rgba(139, 115, 85, 0.1);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--bg-cream) 0%, var(--bg-warm) 100%);
            color: var(--text-dark);
            line-height: 1.6;
            min-height: 100vh;
            padding-bottom: calc(70px + var(--safe-bottom));
            -webkit-overflow-scrolling: touch;
        }

        /* 头部 - 手机优化 */
        header {
            background: linear-gradient(135deg, #2C2416 0%, #4A3C2A 100%);
            color: #fff;
            padding: 1.5rem 1rem 1rem;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }

        h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            letter-spacing: 0.05em;
        }

        .subtitle {
            font-size: 0.75rem;
            color: var(--primary-light);
            font-weight: 300;
            opacity: 0.9;
        }

        /* 搜索栏 - 手机端 */
        .search-container {
            background: #fff;
            padding: 0.75rem 1rem;
            position: sticky;
            top: 68px;
            z-index: 99;
            box-shadow: 0 2px 10px var(--shadow);
        }

        .search-box {
            display: flex;
            align-items: center;
            background: var(--bg-warm);
            border-radius: 25px;
            padding: 0.5rem 1rem;
            border: 1px solid var(--primary-light);
        }

        .search-icon {
            color: var(--text-light);
            margin-right: 0.5rem;
            font-size: 1rem;
        }

        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 0.9rem;
            color: var(--text-dark);
            outline: none;
        }

        .search-input::placeholder {
            color: var(--text-light);
        }

        .search-clear {
            color: var(--text-light);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 0.25rem;
            display: none;
        }

        .search-clear.show {
            display: block;
        }

        /* 横向滚动分类 - 手机优化 */
        .category-scroll {
            background: #fff;
            padding: 0.75rem 0;
            position: sticky;
            top: 123px;
            z-index: 98;
            box-shadow: 0 2px 10px var(--shadow);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .category-scroll::-webkit-scrollbar {
            display: none;
        }

        .category-list {
            display: flex;
            gap: 0.5rem;
            padding: 0 1rem;
            width: max-content;
        }

        .category-chip {
            padding: 0.5rem 1rem;
            border: 1.5px solid var(--primary-light);
            background: #fff;
            color: var(--text-medium);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            user-select: none;
        }

        .category-chip:active {
            transform: scale(0.95);
        }

        .category-chip.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        /* 统计信息 */
        .stats-bar {
            background: linear-gradient(90deg, var(--primary-light) 0%, var(--bg-warm) 100%);
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
            color: var(--text-medium);
            text-align: center;
            position: sticky;
            top: 171px;
            z-index: 97;
        }

        /* 主体内容 */
        .container {
            padding: 0.75rem;
        }

        /* 分类标题 */
        .section-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.1rem;
            color: var(--primary);
            margin: 1.5rem 0.5rem 0.75rem;
            padding-bottom: 0.4rem;
            border-bottom: 2px solid var(--primary-light);
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-weight: 600;
        }

        .section-title::before {
            content: '◆';
            color: var(--accent);
            font-size: 0.7rem;
        }

        .section-title:first-of-type {
            margin-top: 0;
        }

        /* 商品网格 - 手机两列 */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }

        /* 商品卡片 - 手机优化 */
        .product-card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px var(--shadow);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
            position: relative;
        }

        .product-card:active {
            transform: scale(0.98);
            box-shadow: 0 4px 20px rgba(139, 115, 85, 0.2);
        }

        .product-card.hidden {
            display: none;
        }

        /* 图片容器 - 正方形 */
        .image-wrapper {
            position: relative;
            padding-top: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #f5f0e8 0%, #ebe4d9 100%);
        }

        .product-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .product-card:active .product-image {
            transform: scale(1.05);
        }

        /* 快速操作按钮 */
        .quick-actions {
            position: absolute;
            bottom: 0.5rem;
            right: 0.5rem;
            display: flex;
            gap: 0.4rem;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .product-card:active .quick-actions {
            opacity: 1;
        }

        .quick-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.95);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        /* 商品信息 */
        .product-info {
            padding: 0.75rem;
        }

        .product-name {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-dark);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 2.2em;
            margin-bottom: 0.5rem;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-price {
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary);
        }

        .product-price::before {
            content: '¥';
            font-size: 0.8rem;
        }

        .product-tag {
            font-size: 0.65rem;
            padding: 0.2rem 0.5rem;
            background: var(--bg-warm);
            color: var(--text-medium);
            border-radius: 12px;
        }

        /* 底部导航栏 - 手机专属 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            box-shadow: 0 -2px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-around;
            padding: 0.5rem 0 calc(0.5rem + var(--safe-bottom));
            z-index: 1000;
            border-top: 1px solid var(--primary-light);
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
            padding: 0.25rem;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-light);
            text-decoration: none;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-icon {
            font-size: 1.4rem;
            line-height: 1;
        }

        .nav-label {
            font-size: 0.65rem;
            font-weight: 500;
        }

        /* 回到顶部按钮 - 手机优化 */
        .back-to-top {
            position: fixed;
            bottom: calc(80px + var(--safe-bottom));
            right: 1rem;
            width: 44px;
            height: 44px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(139, 115, 85, 0.4);
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
        }

        .back-to-top:active {
            transform: scale(0.9);
            background: var(--accent);
        }

        /* 加载更多 */
        .load-more {
            text-align: center;
            padding: 1.5rem 1rem;
        }

        .load-more-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 25px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .load-more-btn:active {
            transform: scale(0.95);
            background: var(--accent);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-light);
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 0.9rem;
        }

        /* 商品详情弹窗 - 手机全屏 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: #fff;
            width: 100%;
            max-height: 85vh;
            border-radius: 20px 20px 0 0;
            overflow: hidden;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-image {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
        }

        .modal-info {
            padding: 1.25rem;
            max-height: 40vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            line-height: 1.5;
        }

        .modal-price {
            font-size: 1.5rem;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .modal-price::before {
            content: '¥';
            font-size: 1rem;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2001;
        }

        /* 骨架屏 */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* 浮动联系按钮 */
        .fab-contact {
            position: fixed;
            bottom: calc(140px + var(--safe-bottom));
            right: 1rem;
            width: 50px;
            height: 50px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(201, 169, 110, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 998;
            transition: all 0.3s ease;
        }

        .fab-contact:active {
            transform: scale(0.9);
        }

        /* 提示 toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 0.75rem 1.5rem;
            border-radius: 25px;
            font-size: 0.85rem;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 3000;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        /* 加载动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .product-card {
            animation: fadeInUp 0.4s ease forwards;
        }
    </style>
</head>

        <!-- 手链类 -->

            <div class="product-grid" id="bracelet-grid"></div>
        </section>

        <!-- 套装类 -->
        <section id="set-section" data-category="set">
            <h2 class="section-title">套装类</h2>
            <div class="product-grid" id="set-grid"></div>
        </section>

        <!-- 空状态 -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-icon">🔍</div>
            <p class="empty-text">没有找到相关饰品</p>
        </div>
    </main>

    <!-- 底部导航 -->
    <nav class="bottom-nav">
        <a class="nav-item active" data-nav="home">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">首页</span>
        </a>
        <a class="nav-item" data-nav="category">
            <span class="nav-icon">📂</span>
            <span class="nav-label">分类</span>
        </a>
        <a class="nav-item" data-nav="favorites">

            <span class="nav-label">收藏</span>
        </a>
        <a class="nav-item" data-nav="contact">
            <span class="nav-icon">💬</span>
            <span class="nav-label">联系</span>
        </a>
    </nav>

    <!-- 回到顶部 -->

    <!-- 联系浮动按钮 -->
    <button class="fab-contact" id="fabContact" title="联系我">💬</button>

    <!-- 商品详情弹窗 -->

                    如需购买或了解更多详情，请点击下方"联系我"按钮咨询。
                </p>

        </div>
    </div>

    <div class="toast" id="toast"></div>

        // 渲染商品
        function renderProducts() {
            Object.keys(products).forEach(category => {
                const grid = document.getElementById(`${category}-grid`);
                if (!grid) return;

                grid.innerHTML = products[category].map((product, index) => `
                    <div class="product-card" data-category="${category}" data-name="${product.name}" data-price="${product.price}" data-image="${product.image}" style="animation-delay: ${index * 0.05}s">
                        <div class="image-wrapper">
                            <img src="https://qigesmd-1329163657.cos.ap-guangzhou.myqcloud.com/imgxd/${product.image}?imageSlim"
                                 alt="${product.name}"
                                 class="product-image"
                                 loading="lazy">
                        </div>
                        <div class="product-info">
                            <h3 class="product-name">${product.name}</h3>
                            <div class="product-footer">
                                <span class="product-price">${product.price}</span>
                                <span class="product-tag">${product.tag}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            });

            // 绑定卡片点击事件
            document.querySelectorAll('.product-card').forEach(card => {
                card.addEventListener('click', () => openModal(card));
            });
        }

        // 分类筛选
        const categoryChips = document.querySelectorAll('.category-chip');
        const sections = document.querySelectorAll('section[data-category]');

        categoryChips.forEach(chip => {
            chip.addEventListener('click', () => {
                categoryChips.forEach(c => c.classList.remove('active'));
                chip.classList.add('active');

                const category = chip.dataset.category;

                if (category === 'all') {
                    sections.forEach(section => section.style.display = 'block');
                    document.querySelectorAll('.product-card').forEach(card => card.classList.remove('hidden'));
                    updateStats('all');
                } else {
                    sections.forEach(section => {
                        section.style.display = section.dataset.category === category ? 'block' : 'none';
                    });
                    updateStats(category);
                }

                showToast(`已切换到：${chip.textContent}`);
            });
        });

        // 更新统计
        function updateStats(category) {
            const statsBar = document.getElementById('statsBar');
            let count = 0;

            if (category === 'all') {
                Object.values(products).forEach(arr => count += arr.length);
                statsBar.innerHTML = `共 <strong>${count}</strong> 款精选饰品`;
            } else {
                count = products[category]?.length || 0;
                const name = document.querySelector(`[data-category="${category}"].category-chip`)?.textContent || '';
                statsBar.innerHTML = `${name}类共 <strong>${count}</strong> 款`;
            }
        }

        // 搜索功能
        const searchInput = document.getElementById('searchInput');
        const searchClear = document.getElementById('searchClear');

        searchInput.addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase().trim();
            searchClear.classList.toggle('show', keyword.length > 0);

            filterProducts(keyword);
        });

        searchClear.addEventListener('click', () => {
            searchInput.value = '';
            searchClear.classList.remove('show');
            filterProducts('');
        });

        function filterProducts(keyword) {
            const cards = document.querySelectorAll('.product-card');
            let visibleCount = 0;

            cards.forEach(card => {
                const name = card.dataset.name.toLowerCase();
                const tag = card.querySelector('.product-tag').textContent.toLowerCase();

                if (name.includes(keyword) || tag.includes(keyword)) {
                    card.classList.remove('hidden');
                    visibleCount++;
                } else {
                    card.classList.add('hidden');
                }
            });

            // 显示/隐藏空状态
            const emptyState = document.getElementById('emptyState');
            const hasVisible = visibleCount > 0;
            emptyState.style.display = hasVisible ? 'none' : 'block';

            // 隐藏没有可见商品的分类标题
            document.querySelectorAll('section[data-category]').forEach(section => {
                const visibleCards = section.querySelectorAll('.product-card:not(.hidden)');
                section.style.display = visibleCards.length > 0 ? 'block' : 'none';
            });

            // 更新统计
            const statsBar = document.getElementById('statsBar');
            if (keyword) {
                statsBar.innerHTML = `搜索 "${keyword}" 找到 <strong>${visibleCount}</strong> 款`;
            } else {
                updateStats('all');
            }
        }

        // 商品详情弹窗
        const modal = document.getElementById('productModal');
        const modalImage = document.getElementById('modalImage');
        const modalTitle = document.getElementById('modalTitle');
        const modalPrice = document.getElementById('modalPrice');

        function openModal(card) {
            modalImage.src = card.querySelector('.product-image').src;
            modalTitle.textContent = card.dataset.name;
            modalPrice.textContent = card.dataset.price;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        document.getElementById('modalClose').addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        // 底部导航
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                const nav = item.dataset.nav;

                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');

                switch(nav) {
                    case 'home':
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                        break;
                    case 'category':
                        document.querySelector('.category-scroll').scrollIntoView({ behavior: 'smooth' });
                        break;
                    case 'favorites':
                        showToast('收藏功能开发中...');
                        break;
                    case 'contact':
                        contactSeller();
                        break;
                }
            });
        });

        // 回到顶部
        const backToTop = document.getElementById('backToTop');

        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                backToTop.classList.add('visible');
            } else {
                backToTop.classList.remove('visible');
            }
        });

        backToTop.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // 联系按钮
        document.getElementById('fabContact').addEventListener('click', contactSeller);

        function contactSeller() {
            showToast('正在打开联系方式...');
            // 这里可以替换为实际的联系方式
            setTimeout(() => {
                alert('微信号：请添加客服微信咨询购买\n（示例：请替换为真实联系方式）');
            }, 500);
        }

        // Toast 提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // 初始化
        renderProducts();
        updateStats('all');

        // 添加触摸滑动支持
        let touchStartX = 0;
        let touchEndX = 0;

        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            const swipeThreshold = 50;
            const diff = touchStartX - touchEndX;

            if (Math.abs(diff) > swipeThreshold) {
                const chips = Array.from(categoryChips);
                const activeIndex = chips.findIndex(c => c.classList.contains('active'));

                if (diff > 0 && activeIndex < chips.length - 1) {
                    // 向左滑，下一个分类
                    chips[activeIndex + 1].click();
                } else if (diff < 0 && activeIndex > 0) {
                    // 向右滑，上一个分类
                    chips[activeIndex - 1].click();
                }
            }
        }

        // 防止图片拖拽
        document.addEventListener('dragstart', e => {
            if (e.target.tagName === 'IMG') e.preventDefault();
        });
    </script>
